    <style>
      * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
      html, body, #root { margin: 0; padding: 0; min-height: 100%; }
      body {
        background: #FFE600;
        font-family: "Helvetica Neue", Arial, system-ui, sans-serif;
        -webkit-font-smoothing: antialiased;
      }
      /* neo-brutalist press: button drops into its own shadow */
      button { font-family: inherit; cursor: pointer; transition: transform .05s ease, box-shadow .05s ease; }
      .nb:active { transform: translate(3px, 3px); box-shadow: 0 0 0 #111 !important; }
      input { font-family: inherit; }
      ::-webkit-scrollbar { width: 0; height: 0; }

      /* content enters with a hard neo-brutalist slide */
      @keyframes nbFade { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: none; } }
      .nb-fadein { animation: nbFade .22s ease-out both; }

      /* bottom sheet slams up */
      @keyframes nbSheet { from { transform: translateY(100%); } to { transform: none; } }
      .nb-sheet { animation: nbSheet .26s cubic-bezier(.2,.9,.2,1) both; }

      /* followed team: pulsing green ring around the black shadow */
      @keyframes favPulse {
        0%,100% { box-shadow: 5px 5px 0 #111; }
        50%     { box-shadow: 5px 5px 0 #111, 0 0 0 3px #00D26A; }
      }
      .nb-fav { animation: favPulse 1.5s ease-in-out infinite; }

      /* live badge blink */
      @keyframes nbBlink { 0%,100% { opacity: 1; } 50% { opacity: .35; } }
      .nb-blink { animation: nbBlink 1s steps(1,end) infinite; }

      /* goal pop */
      @keyframes nbPop { 0% { transform: scale(1); } 35% { transform: scale(1.18); } 100% { transform: scale(1); } }
      .nb-pop { animation: nbPop .5s ease-out; }

      @media (prefers-reduced-motion: reduce) {
        .nb-fadein, .nb-sheet, .nb-fav, .nb-blink, .nb-pop { animation: none !important; }
      }
    </style>
